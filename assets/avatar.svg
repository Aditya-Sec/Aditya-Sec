<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <defs>
    <style>.mono{font-family:'SFMono-Regular',Consolas,Menlo,monospace;}</style>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4dd4e8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4dd4e8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="80" cy="80" r="75" fill="url(#glow)">
    <animate attributeName="r" values="70;78;70" dur="3s" repeatCount="indefinite"/>
  </circle>

  <circle cx="80" cy="80" r="58" fill="#0d1012" stroke="#1c2226" stroke-width="2"/>
  <circle cx="80" cy="80" r="58" fill="none" stroke="#4dd4e8" stroke-width="2" opacity="0.6">
    <animate attributeName="r" values="58;64;58" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <text x="80" y="97" text-anchor="middle" class="mono" font-size="36" font-weight="700" fill="#eef2f4">AK</text>

  <!-- status dot -->
  <circle cx="126" cy="126" r="10" fill="#0d1012" stroke="#0d1012" stroke-width="3"/>
  <circle cx="126" cy="126" r="6" fill="#4dd4e8">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
</svg>

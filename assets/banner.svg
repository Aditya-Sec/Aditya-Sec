<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280">
  <defs>
    <style>
      .mono { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
    </style>
    <linearGradient id="vgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1012"/>
      <stop offset="100%" stop-color="#0a0c0e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="280" rx="12" fill="url(#vgrad)"/>

  <!-- faint grid, subject-appropriate texture (log/grid lines, not decoration) -->
  <g stroke="#151a1d" stroke-width="1">
    <line x1="0" y1="70" x2="1200" y2="70"/>
    <line x1="0" y1="140" x2="1200" y2="140"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
  </g>

  <!-- terminal chrome -->
  <rect x="0" y="0" width="1200" height="36" fill="#111417" rx="12"/>
  <rect x="0" y="24" width="1200" height="12" fill="#111417"/>
  <circle cx="26" cy="18" r="6" fill="#3a3f44"/>
  <circle cx="48" cy="18" r="6" fill="#3a3f44"/>
  <circle cx="70" cy="18" r="6" fill="#3a3f44"/>
  <text x="600" y="23" text-anchor="middle" class="mono" font-size="13" fill="#5a6169">aditya@soc — zsh — 120x28</text>

  <!-- prompt lines -->
  <text x="40" y="95" class="mono" font-size="22" fill="#4dd4e8">aditya@soc</text>
  <text x="204" y="95" class="mono" font-size="22" fill="#5a6169">:~$ whoami</text>

  <text x="40" y="140" class="mono" font-size="34" font-weight="600" fill="#eef2f4">Aditya Goswami</text>

  <text x="40" y="180" class="mono" font-size="18" fill="#9aa3ab">Security Operations Engineer — detection, triage, response.</text>
  <text x="40" y="205" class="mono" font-size="18" fill="#9aa3ab">I read logs the way other people read headlines.</text>

  <!-- prompt cursor with tasteful blink -->
  <text x="40" y="240" class="mono" font-size="22" fill="#4dd4e8">$</text>
  <rect x="58" y="222" width="12" height="24" fill="#4dd4e8">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
